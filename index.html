<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDA Pro LC V21 - Neon Pulsing</title>
<style>
:root{--bg:#07111f; --card:#111b2f; --txt:#edf4ff; --t:#2dd4bf; --b:#60a5fa; --y:#facc15; --r:#fb7185;}
body{background:var(--bg); color:var(--txt); font-family:sans-serif; padding:20px;}
.card{background:var(--card); padding:20px; border-radius:20px; margin-bottom:20px;}
.hidden{display:none !important;}

/* --- Animation Scintillement --- */
@keyframes pulse {
  0% { opacity: 1; transform: scale(1); box-shadow: 0 0 5px var(--t); }
  50% { opacity: 0.7; transform: scale(1.02); box-shadow: 0 0 15px var(--t); }
  100% { opacity: 1; transform: scale(1); box-shadow: 0 0 5px var(--t); }
}
.scintille { animation: pulse 2s infinite ease-in-out; border: 1px solid var(--t); }

button{width:100%; padding:15px; margin:6px 0; border-radius:15px; border:none; font-weight:900; text-transform:uppercase; color:#000; box-shadow:0 0 15px rgba(0,0,0,0.5); transition:0.3s;}
.btn-rot{background:var(--t);} .btn-swap{background:var(--b);} .btn-repo{background:var(--y);} .btn-out{background:var(--r);}

input,select{width:100%; padding:14px; margin:8px 0; border-radius:14px; background:var(--card); border:2px solid var(--t); color:var(--txt);}
.swap-result{padding:16px; border-radius:16px; margin-top:10px; font-weight:bold;}
</style>
</head>
<body>

<div id="loginCard" class="card">
  <h2>Connexion</h2>
  <input id="login" placeholder="Code profil">
  <input id="pass" type="password" placeholder="Mot de passe">
  <button class="btn-rot" onclick="connect()">Se connecter</button>
</div>

<div id="appCard" class="card hidden">
  <button class="btn-rot" onclick="showTab('mesRotations')">Mes Rotations</button>
  <button class="btn-swap" onclick="showTab('moteurSwap')">Moteur de Swap</button>
  <button class="btn-repo" onclick="showTab('strategieRepos')">Stratégie Repos</button>
  <button class="btn-out" onclick="logout()">Déconnexion</button>
  
  <div id="mesRotations" class="hidden"><h3>Mes Rotations</h3><div id="rotationsList"></div></div>
  <div id="moteurSwap" class="hidden"><h3>Swap</h3><select id="selRot"></select><input id="rotRech"><button class="btn-swap" onclick="calcSwap()">Calculer</button><div id="swapResult" class="swap-result hidden"></div></div>
  <div id="strategieRepos" class="hidden"><h3>Stratégie Repos</h3><select id="selRepos"></select><button class="btn-repo" onclick="calcFatigue()">Calculer Fatigue</button><div id="resultatFatigue" class="swap-result hidden"></div></div>
</div>

<script>
const USERS = { PNC01:{password:"demo01", nom:"Alex", rotations:["JFK 4J 320€","NRT 5J 410€"]}, PNC02:{password:"demo02", nom:"Sophie", rotations:["LAX 5J 430€","MAD 2J 120€"]} };

function connect(){
  const l = document.getElementById("login").value.trim().toUpperCase();
  const p = document.getElementById("pass").value.trim();
  if(USERS[l] && USERS[l].password === p){
    sessionStorage.setItem("user", l);
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("appCard").classList.remove("hidden");
    loadUserData();
  } else { alert("Code incorrect"); }
}

function loadUserData(){
  const l = sessionStorage.getItem("user");
  const u = USERS[l];
  // Ici on ajoute la classe .scintille pour faire briller les rotations
  document.getElementById("rotationsList").innerHTML = u.rotations.map(r=>`<div class="scintille" style="margin:10px; padding:10px; border-radius:10px;">${r}</div>`).join("");
  document.getElementById("selRot").innerHTML = u.rotations.map(r=>`<option>${r}</option>`).join("");
  document.getElementById("selRepos").innerHTML = u.rotations.map(r=>`<option>${r}</option>`).join("");
}

function showTab(id){
  ["mesRotations","moteurSwap","strategieRepos"].forEach(t => document.getElementById(t).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function calcSwap(){
  const res = document.getElementById("swapResult");
  res.classList.remove("hidden"); res.className = "swap-result"; res.style.background = "var(--t)";
  res.innerHTML = "Calcul Swap réalisé.";
}

function calcFatigue(){
  const rot = document.getElementById("selRepos").value;
  const type = prompt("Type vol? (1:Court, 2:Long, 3:VLC)", "2");
  const jours = parseInt(rot.match(/\d+/)) || 0;
  const f = (jours * 1.5) * (type==="3"?2.0:(type==="2"?1.5:1.0));
  const res = document.getElementById("resultatFatigue");
  res.classList.remove("hidden"); res.style.background = f>10?"var(--r)":"var(--t)";
  res.innerHTML = `Indice Fatigue : ${f.toFixed(1)}/20<br><small>Note : Jours (${jours}) x 1.5 x Coef (${type})</small>`;
}

function logout(){ sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
