<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDA Pro LC V21</title>
<style>
:root{--bg:#07111f; --card:#111b2f; --acc:#2dd4bf; --acc2:#60a5fa; --txt:#edf4ff; --ok:#4ade80; --bad:#fb7185; --y:#facc15;}
body{background:var(--bg); color:var(--txt); font-family:sans-serif; padding:20px; margin:0}
.card{background:var(--card); padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid rgba(45,212,191,0.3)}
.hidden{display:none !important}
/* --- Animation Scintillement --- */
@keyframes pulse { 0%{opacity:1; box-shadow:0 0 5px var(--acc);} 50%{opacity:0.6; box-shadow:0 0 20px var(--acc);} 100%{opacity:1; box-shadow:0 0 5px var(--acc);} }
.scintille { animation: pulse 2s infinite; border: 1px solid var(--acc); padding:10px; margin:10px 0; border-radius:10px; }
/* --- Boutons Fluo Néon --- */
button{width:100%; padding:15px; margin:6px 0; border-radius:15px; border:none; font-weight:900; background:linear-gradient(135deg,var(--acc),var(--acc2)); color:#06101d; text-transform:uppercase; box-shadow:0 0 15px rgba(45,212,191,.5);}
.btn-secondary{background:transparent; border:2px solid var(--acc2); color:var(--acc2);}
input{width:100%; padding:14px; margin:8px 0; border-radius:14px; background:var(--card); border:2px solid var(--acc); color:var(--txt);}
</style>
</head>
<body>

<div id="loginCard" class="card">
  <h2>Connexion</h2>
  <input id="login" placeholder="Code profil (PNC01)">
  <input id="pass" type="password" placeholder="Mot de passe">
  <button onclick="connect()">Se connecter</button>
</div>

<div id="app" class="card hidden">
  <button onclick="showTab('rots')">Rotations</button>
  <button onclick="showTab('swap')">Swap</button>
  <button onclick="showTab('repo')">Repos</button>
  <button class="btn-secondary" onclick="logout()">Déconnexion</button>
  
  <div id="rots"><h3>Mes Rotations</h3><div id="list"></div></div>
  <div id="swap" class="hidden"><h3>Swap</h3><select id="selRot"></select><input id="rotRech" placeholder="Recherche"><button onclick="calcSwap()">Calculer</button><div id="sRes"></div></div>
  <div id="repo" class="hidden"><h3>Stratégie Repos</h3><select id="selRepos"></select><button onclick="fatigue()">Calculer Fatigue</button><div id="fRes"></div></div>
</div>

<script>
const USERS = {
  PNC01:{password:"demo01", nom:"Alex", rotations:["JFK 4J 320€","NRT 5J 410€"]},
  PNC02:{password:"demo02", nom:"Sophie", rotations:["LAX 5J 430€","MAD 2J 120€"]}
};
// Ajoute ici les autres profils PNC03 à PNC20...

function connect(){
  const l = document.getElementById("login").value.toUpperCase();
  if(USERS[l] && USERS[l].password === document.getElementById("pass").value){
    sessionStorage.setItem("user", l);
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    render();
  }
}

function render(){
  const u = USERS[sessionStorage.getItem("user")];
  document.getElementById("list").innerHTML = u.rotations.map(r=>`<div class="scintille">${r}</div>`).join("");
  document.getElementById("selRot").innerHTML = u.rotations.map(r=>`<option>${r}</option>`).join("");
  document.getElementById("selRepos").innerHTML = u.rotations.map(r=>`<option>${r}</option>`).join("");
}

function showTab(id){
  ["rots","swap","repo"].forEach(t => document.getElementById(t).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function fatigue(){
  const rot = document.getElementById("selRepos").value;
  const type = prompt("Type vol? (1:Court, 2:Long, 3:VLC)", "2");
  const j = parseInt(rot.match(/\d+/)) || 0;
  const f = (j * 1.5) * (type==="3"?2.0:(type==="2"?1.5:1.0));
  document.getElementById("fRes").innerHTML = `Indice Fatigue : ${f.toFixed(1)}/20 <br><small>Note : Jours (${j}) x 1.5 x Coef (${type})</small>`;
}

function logout(){ sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
