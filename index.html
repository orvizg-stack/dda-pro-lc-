<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDA Pro LC V21 - Neon Edition</title>
<meta name="theme-color" content="#2dd4bf">
<style>
body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); color: #e2e8f0; margin: 0; padding: 20px; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
h1 { text-align: center; background: linear-gradient(45deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2em; margin-bottom: 10px; }
.hidden { display: none; }
.login-form { text-align: center; margin: 50px 0; }
input[type="text"], input[type="password"] { width: 200px; padding: 15px; margin: 10px; border: none; border-radius: 10px; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; }
input[type="text"]::placeholder, input[type="password"]::placeholder { color: #a0a0a0; }
.btn { padding: 15px 30px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px; transition: all 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
.btn-neon-green { background: linear-gradient(45deg, #10b981, #059669); color: white; animation: pulse 2s infinite; }
.btn-neon-blue { background: linear-gradient(45deg, #3b82f6, #1d4ed8); color: white; }
.btn-neon-purple { background: linear-gradient(45deg, #8b5cf6, #6d28d9); color: white; }
.btn-neon-orange { background: linear-gradient(45deg, #f59e0b, #d97706); color: white; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 20px currentColor; } 50% { box-shadow: 0 0 40px currentColor; } }
.swap-result { padding: 20px; border-radius: 15px; text-align: center; font-size: 1.5em; font-weight: bold; margin: 20px 0; }
.swap-ok { background: linear-gradient(45deg, #10b981, #059669); color: white; animation: glow 1.5s infinite alternate; }
.swap-bad { background: linear-gradient(45deg, #ef4444, #dc2626); color: white; animation: glow 1.5s infinite alternate; }
@keyframes glow { 0% { box-shadow: 0 0 20px rgba(16,185,129,0.5); } 100% { box-shadow: 0 0 40px rgba(16,185,129,0.8); } }
section { margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
label { display: block; margin: 10px 0 5px; font-weight: bold; }
select, input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
.note { font-size: 0.9em; color: #a0a0a0; margin-top: 10px; font-style: italic; }
#adminPanel { background: rgba(139,92,246,0.2); }
</style>
</head>
<body>
<div class="container">
<h1>✈️ DDA Pro LC V21 - Neon Edition</h1>
<div id="loginScreen" class="login-form">
<input type="text" id="userId" placeholder="Identifiant (ex: PNC01)">
<input type="password" id="userPwd" placeholder="Mot de passe">
<button class="btn btn-neon-blue" onclick="login()">Connexion</button>
</div>
<div id="mainApp" class="hidden">
<button class="btn btn-neon-purple" onclick="logout()">Déconnexion</button>
<section id="mesRotations">
<h2>Mes Rotations</h2>
<!-- Contenu rotations ici, comme avant -->
</section>
<section>
<h2>Stratégie Repos & Pénibilité</h2>
<label>Rotation repos :</label>
<select id="selRepos">
<option value="1:Court">1 jour (Court)</option>
<option value="2:Long">2 jours (Long)</option>
<option value="3:VLC">3 jours (VLC)</option>
</select>
<button class="btn btn-neon-green" onclick="calcFatigue()">Calculer Indice Fatigue</button>
<div id="resultatFatigue" class="hidden swap-result"></div>
</section>
<section id="adminPanel" class="hidden">
<h2>Admin</h2>
<!-- Panneau admin -->
</section>
</div>
</div>
<script>
let currentUser = '';
function login() {
  const uid = document.getElementById('userId').value.toUpperCase();
  const pwd = document.getElementById('userPwd').value;
  // Logique de connexion originale (20 profils + admin)
  if (uid === 'PNC01' && pwd === 'demo01') { currentUser = 'PNC01'; showApp(); return; }
  if (uid === 'ADMIN' && pwd === 'admin2026') { document.getElementById('adminPanel').classList.remove('hidden'); }
  // Ajoute autres profils...
  alert('Identifiants incorrects');
}
function showApp() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); }
function calcFatigue() {
  const rot = document.getElementById('selRepos').value;
  const type = prompt('Type de vol ? (1:Court, 2:Long, 3:VLC)');
  const jours = parseInt(rot.match(/\d+/)[0]);
  const f = (jours * 1.5) * (type === '3' ? 2.0 : 1.5);
  const res = document.getElementById('resultatFatigue');
  res.classList.remove('hidden');
  res.className = 'swap-result ' + (f > 10 ? 'swap-bad' : 'swap-ok');
  const noteExplicative = '<br><span class="note">Note : ' + jours + ' jours × 1.5 × (VLC=2.0 sinon 1.5)</span>';
  res.innerHTML = 'Indice : <strong>' + f.toFixed(1) + '/20</strong>' + noteExplicative;
}
function logout() { sessionStorage.clear(); location.reload(); }
// MoteurSwap et autres fonctions originales ici...
</script>
</body>
</html>
